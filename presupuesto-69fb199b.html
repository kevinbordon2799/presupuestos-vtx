<body class="bg-gray-100 p-6">

    <div class="max-w-[400px] mx-auto bg-white p-6 border-2 border-gray-300">

        <!-- PRESUPUESTO -->

        <div id="budgetResult" class="flex flex-col h-full">
            <h2 class="text-2xl font-bold text-center mb-4 text-white bg-blue-600 py-2 w-full">
                Presupuesto
            </h2>

            <div class="flex flex-col">
                <span class="font-bold text-xs">
                    Fecha:
                    <span class="font-normal" id="fechaActual"></span>
                </span>
            </div>

            <div id="cardsContainer" class="mt-6 grid grid-cols-1 gap-4"></div>

            <div class="flex mt-6">
                <span class="text-xs leading-[1.2em]">
                    Los precios indicados en este presupuesto corresponden a la
                    <strong>fecha de emisión del mismo</strong> y están
                    <strong>sujetos a cambios</strong> sin previo aviso.
                </span>
            </div>

            <div class="mt-6 text-xl font-bold flex justify-end">
                <div class="bg-blue-600 px-4 py-2 text-white">
                    Total: <span id="total">$0</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Fecha actual
        const $currentData = document.getElementById("fechaActual");

        $currentData.textContent = new Date().toLocaleString("es-AR", {
            day: "2-digit",
            month: "long",
            year: "numeric"
        });

        // Formateador de moneda
        const formatARS = (value) =>
            new Intl.NumberFormat("es-AR", {
                style: "currency",
                currency: "ARS",
                maximumFractionDigits: 0
            }).format(value);

        // Renderizado del presupuesto
        function renderBudget(data) {
            const container = document.getElementById("cardsContainer");
            const totalEl = document.getElementById("total");

            container.innerHTML = "";

            let total = Big(0);

            data.forEach((item) => {
                if (
                    item.cant == null ||
                    item.unitPrice == null ||
                    !item.name
                ) return;

                const cant = Big(item.cant);
                const unit = Big(item.unitPrice);
                const subtotal = cant.times(unit);

                total = total.plus(subtotal);

                const card = document.createElement("div");
                card.className = "bg-gray-50 border p-4 shadow-sm";

                card.innerHTML = `
                    <h3 class="font-semibold text-lg mb-2">
                        ${item.name}
                    </h3>

                    <div class="text-sm text-gray-700 space-y-1">
                        <div class="flex justify-between">
                            <span>Cantidad</span>
                            <span class="font-medium">${item.cant}</span>
                        </div>

                        <div class="flex justify-between">
                            <span>Precio unitario</span>
                            <span>${formatARS(unit.toNumber())}</span>
                        </div>

                        <div class="flex justify-between border-t pt-2 font-semibold">
                            <span>Total</span>
                            <span>${formatARS(subtotal.toNumber())}</span>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });

            totalEl.textContent = formatARS(total.toNumber());
        }

        // Generar presupuesto automáticamente
        renderBudget(products);
    </script>

</body>
